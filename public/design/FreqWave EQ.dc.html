<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;background:#0a0b0d}
  </style>
</helmet>

<div style="--accent: {{ accentVar }};min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px;background:radial-gradient(120% 100% at 50% 0%,#16171b 0%,#0a0b0d 60%);font-family:'Archivo',sans-serif">

  <div style="width:720px;border-radius:24px;padding:30px;background:linear-gradient(165deg,#1d1e23 0%,#131418 100%);border:1px solid rgba(255,255,255,.08);box-shadow:0 40px 90px -30px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.05)">

    <!-- HEADER -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:26px">
      <div style="display:flex;align-items:baseline;gap:1px;font-weight:800;font-size:22px;letter-spacing:-.02em">
        <span style="color:#f3f3f5">Freq</span><span style="color:var(--accent,#a9e80c)">Wave</span><span style="color:#7d7d85;font-weight:500;margin-left:7px;font-size:18px">EQ</span>
      </div>
      <div onClick="{{ onEngine }}" style="display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;cursor:pointer;user-select:none;background:#141518;border:1px solid rgba(255,255,255,.08);box-shadow:inset 0 1px 0 rgba(255,255,255,.04)">
        <span style="width:8px;height:8px;border-radius:50%;background:{{ engineColor }};box-shadow:0 0 10px {{ engineGlow }};transition:.2s"></span>
        <span style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;color:{{ engineColor }};transition:.2s">{{ engineLabel }}</span>
      </div>
    </div>

    <!-- CONTROLS ROW -->
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:24px;margin-bottom:26px">

      <!-- knobs -->
      <div style="display:flex;gap:30px;align-items:flex-start">
        <!-- MASTER -->
        <div style="text-align:center">
          <div style="position:relative;width:132px;height:132px;cursor:ns-resize;touch-action:none" onPointerDown="{{ onMaster }}">
            <svg width="132" height="132" viewBox="0 0 132 132" style="position:absolute;inset:0">
              <circle cx="66" cy="66" r="56" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="5" stroke-linecap="round" stroke-dasharray="263.9 352" transform="rotate(135 66 66)"></circle>
              <circle cx="66" cy="66" r="56" fill="none" stroke="var(--accent,#a9e80c)" stroke-width="5" stroke-linecap="round" stroke-dasharray="{{ master.dash }}" transform="rotate(135 66 66)" style="filter:drop-shadow(0 0 5px rgba(169,232,12,.5))"></circle>
            </svg>
            <div style="position:absolute;left:50%;top:50%;width:88px;height:88px;margin:-44px 0 0 -44px;border-radius:50%;background:radial-gradient(circle at 36% 30%,#34363d 0%,#1a1b1f 62%,#141519 100%);border:1px solid rgba(0,0,0,.55);box-shadow:inset 0 2px 3px rgba(255,255,255,.06),inset 0 -8px 16px rgba(0,0,0,.6),0 10px 22px -8px rgba(0,0,0,.85)"></div>
            <div style="position:absolute;left:calc(50% - 2px);top:16px;width:4px;height:25px;border-radius:2px;background:var(--accent,#a9e80c);box-shadow:0 0 12px rgba(169,232,12,.8);transform-origin:50% 50px;transform:rotate({{ master.rot }}deg)"></div>
          </div>
          <div style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#7d7d85;font-weight:600;margin-top:12px">Master Volume</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#5d5d65;margin-top:3px">DB GAIN · <span style="color:var(--accent,#a9e80c)">{{ master.val }}%</span></div>
        </div>
        <!-- PRE-AMP -->
        <div style="text-align:center;padding-top:18px">
          <div style="position:relative;width:92px;height:92px;cursor:ns-resize;touch-action:none" onPointerDown="{{ onPreamp }}">
            <svg width="92" height="92" viewBox="0 0 92 92" style="position:absolute;inset:0">
              <circle cx="46" cy="46" r="38" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="4" stroke-linecap="round" stroke-dasharray="179.1 239" transform="rotate(135 46 46)"></circle>
              <circle cx="46" cy="46" r="38" fill="none" stroke="var(--accent,#a9e80c)" stroke-width="4" stroke-linecap="round" stroke-dasharray="{{ preamp.dash }}" transform="rotate(135 46 46)" style="filter:drop-shadow(0 0 4px rgba(169,232,12,.45))"></circle>
            </svg>
            <div style="position:absolute;left:50%;top:50%;width:60px;height:60px;margin:-30px 0 0 -30px;border-radius:50%;background:radial-gradient(circle at 36% 30%,#34363d 0%,#1a1b1f 62%,#141519 100%);border:1px solid rgba(0,0,0,.55);box-shadow:inset 0 2px 3px rgba(255,255,255,.06),inset 0 -6px 12px rgba(0,0,0,.6),0 8px 16px -6px rgba(0,0,0,.85)"></div>
            <div style="position:absolute;left:calc(50% - 1.5px);top:12px;width:3px;height:17px;border-radius:2px;background:var(--accent,#a9e80c);box-shadow:0 0 10px rgba(169,232,12,.8);transform-origin:50% 34px;transform:rotate({{ preamp.rot }}deg)"></div>
          </div>
          <div style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#7d7d85;font-weight:600;margin-top:12px">Pre-Amp</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#5d5d65;margin-top:3px">DB BOOST · <span style="color:var(--accent,#a9e80c)">{{ preamp.val }}%</span></div>
        </div>
      </div>

      <!-- presets -->
      <div style="flex:1;max-width:320px;text-align:right">
        <div style="font-size:14px;font-weight:700;color:#e8e8ec;letter-spacing:-.01em">Voice Enhancer</div>
        <div style="font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#5d5d65;margin-top:3px;font-weight:600">DSP Algorithmic Presets</div>
        <div style="position:relative;display:flex;margin-top:16px;padding:4px;border-radius:12px;background:#0f1012;border:1px solid rgba(255,255,255,.06);box-shadow:inset 0 2px 5px rgba(0,0,0,.5);color:#83838b">
          <div style="position:absolute;top:4px;left:4px;bottom:4px;width:calc((100% - 8px)/4);border-radius:8px;background:rgba(169,232,12,.12);border:1px solid rgba(169,232,12,.45);box-shadow:0 0 14px rgba(169,232,12,.18);transition:transform .28s cubic-bezier(.4,0,.2,1);transform:translateX({{ presetTx }})"></div>
          <button onClick="{{ onPreset0 }}" style="position:relative;z-index:1;flex:1;border:none;background:none;cursor:pointer;padding:9px 0;font-family:'Archivo',sans-serif;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:{{ p0col }}">Off</button>
          <button onClick="{{ onPreset1 }}" style="position:relative;z-index:1;flex:1;border:none;background:none;cursor:pointer;padding:9px 0;font-family:'Archivo',sans-serif;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:{{ p1col }}">Dialogue</button>
          <button onClick="{{ onPreset2 }}" style="position:relative;z-index:1;flex:1;border:none;background:none;cursor:pointer;padding:9px 0;font-family:'Archivo',sans-serif;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:{{ p2col }}">Leveler</button>
          <button onClick="{{ onPreset3 }}" style="position:relative;z-index:1;flex:1;border:none;background:none;cursor:pointer;padding:9px 0;font-family:'Archivo',sans-serif;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:{{ p3col }}">Clarity</button>
        </div>
      </div>
    </div>

    <!-- SPECTRUM -->
    <div style="position:relative;height:128px;border-radius:14px;overflow:hidden;background:#0c0d10;border:1px solid rgba(255,255,255,.06);box-shadow:inset 0 2px 8px rgba(0,0,0,.6);background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:100% 32px,12.5% 100%">
      <canvas ref="{{ canvasRef }}" style="width:100%;height:100%;display:block"></canvas>
    </div>

    <!-- EQ BANDS -->
    <div style="margin-top:18px;padding:22px 18px 16px;border-radius:14px;background:#0f1012;border:1px solid rgba(255,255,255,.06);box-shadow:inset 0 2px 6px rgba(0,0,0,.5)">
      <div style="display:flex;justify-content:space-between">
        <sc-for list="{{ bands }}" as="b" hint-placeholder-count="8">
          <div style="flex:1;display:flex;flex-direction:column;align-items:center">
            <div style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:{{ b.dbColor }}">{{ b.dbLabel }}</div>
            <div onPointerDown="{{ b.onDown }}" style="position:relative;width:34px;height:150px;margin:12px 0;cursor:ns-resize;touch-action:none;display:flex;justify-content:center">
              <div style="position:absolute;top:0;bottom:0;width:5px;border-radius:3px;background:rgba(255,255,255,.06);box-shadow:inset 0 1px 3px rgba(0,0,0,.7)"></div>
              <div style="position:absolute;left:50%;top:50%;width:14px;height:1px;margin-left:-7px;background:rgba(255,255,255,.14)"></div>
              <div style="position:absolute;left:50%;width:5px;margin-left:-2.5px;border-radius:3px;background:var(--accent,#a9e80c);box-shadow:0 0 8px rgba(169,232,12,.5);bottom:{{ b.fillBottom }};height:{{ b.fillHeight }}"></div>
              <div style="position:absolute;left:50%;width:30px;height:14px;margin-left:-15px;border-radius:4px;background:linear-gradient(180deg,#3a3c43,#222328);border:1px solid rgba(0,0,0,.6);box-shadow:0 3px 6px -1px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;bottom:{{ b.handleBottom }}">
                <div style="width:14px;height:2px;border-radius:1px;background:var(--accent,#a9e80c);box-shadow:0 0 6px rgba(169,232,12,.7)"></div>
              </div>
            </div>
            <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#83838b">{{ b.freq }}</div>
          </div>
        </sc-for>
      </div>
    </div>

    <!-- FOOTER -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:22px">
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;color:#44444c">AUDIO ENHANCEMENT SUITE · V2.0</div>
      <button onClick="{{ onZero }}" style="font-family:'Archivo',sans-serif;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#a4a4ac;padding:9px 18px;border-radius:9px;background:#16171b;border:1px solid rgba(255,255,255,.1);cursor:pointer;transition:.18s" style-hover="color:var(--accent,#a9e80c);border-color:rgba(169,232,12,.5);box-shadow:0 0 16px rgba(169,232,12,.15)">Zero EQ</button>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:760,&quot;height&quot;:740},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#a9e80c&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;masterDefault&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:65,&quot;min&quot;:0,&quot;max&quot;:100,&quot;tsType&quot;:&quot;number&quot;},&quot;engineOn&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  constructor(props) {
    super(props);
    const PRESETS = {
      OFF: [0, 0, 0, 0, 0, 0, 0, 0],
      DIALOGUE: [-3, -2, 0, 2, 3, 4, 2, 0],
      LEVELER: [1, 1, 1, 0, 0, 1, 1, 1],
      CLARITY: [-1, 0, 1, 2, 3, 5, 6, 4],
    };
    this.PRESETS = PRESETS;
    this.PRESET_ORDER = ['OFF', 'DIALOGUE', 'LEVELER', 'CLARITY'];
    this.FREQS = ['32Hz', '64Hz', '125Hz', '250Hz', '500Hz', '1kHz', '4kHz', '8kHz'];
    this.state = {
      engine: this.props?.engineOn ?? true,
      master: this.props?.masterDefault ?? 65,
      preamp: 40,
      preset: 'DIALOGUE',
      bands: PRESETS.DIALOGUE.slice(),
    };
  }

  componentDidMount() { this.startSpectrum(); }

  setCanvas = (el) => {
    this.canvasEl = el;
    if (el && !this.raf) this.startSpectrum();
  };
  componentWillUnmount() {
    cancelAnimationFrame(this.raf);
    if (this._resize) window.removeEventListener('resize', this._resize);
  }

  // ---- knob drag (value 0..100) ----
  makeKnob(key) {
    return (e) => {
      e.preventDefault();
      const startY = e.clientY;
      const start = this.state[key];
      const move = (ev) => {
        const nv = Math.max(0, Math.min(100, start + (startY - ev.clientY) * 0.6));
        this.setState({ [key]: nv });
      };
      const up = () => {
        window.removeEventListener('pointermove', move);
        window.removeEventListener('pointerup', up);
      };
      window.addEventListener('pointermove', move);
      window.addEventListener('pointerup', up);
    };
  }

  // ---- band fader drag (dB -12..+12) ----
  makeBand(i) {
    return (e) => {
      e.preventDefault();
      const rect = e.currentTarget.getBoundingClientRect();
      const set = (clientY) => {
        let pct = 1 - (clientY - rect.top) / rect.height;
        pct = Math.max(0, Math.min(1, pct));
        const db = pct * 24 - 12;
        this.setState((s) => {
          const bands = s.bands.slice();
          bands[i] = db;
          return { bands, preset: null };
        });
      };
      set(e.clientY);
      const move = (ev) => set(ev.clientY);
      const up = () => {
        window.removeEventListener('pointermove', move);
        window.removeEventListener('pointerup', up);
      };
      window.addEventListener('pointermove', move);
      window.addEventListener('pointerup', up);
    };
  }

  applyPreset(name) {
    this.setState({ preset: name, bands: this.PRESETS[name].slice() });
  }

  // ---- spectrum canvas ----
  startSpectrum() {
    const cv = this.canvasEl;
    if (!cv) return;
    const ctx = cv.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const resize = () => {
      this.cw = cv.clientWidth; this.ch = cv.clientHeight;
      cv.width = this.cw * dpr; cv.height = this.ch * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    };
    this._resize = resize;
    resize();
    window.addEventListener('resize', resize);

    const loop = (ts) => {
      const W = this.cw, H = this.ch;
      if (!W) { this.raf = requestAnimationFrame(loop); return; }
      const bands = this.state.bands;
      const engine = this.state.engine;
      const t = ts / 1000;
      const n = bands.length;
      const mid = H * 0.56;
      ctx.clearRect(0, 0, W, H);
      const steps = Math.max(64, Math.floor(W / 4));
      const pts = [];
      for (let s = 0; s <= steps; s++) {
        const x = (s / steps) * W;
        let infl = 0;
        for (let i = 0; i < n; i++) {
          const cx = ((i + 0.5) / n) * W;
          const sigma = (W / n) * 0.62;
          infl += bands[i] * Math.exp(-((x - cx) * (x - cx)) / (2 * sigma * sigma));
        }
        const amp = engine ? 1 : 0.22;
        const noise = engine
          ? (Math.sin(x * 0.03 + t * 2) + Math.sin(x * 0.013 - t * 1.3) * 0.6) * 3
          : Math.sin(x * 0.02 + t) * 1.1;
        pts.push([x, mid - infl * 3 * amp + noise * amp]);
      }
      const col = engine ? '169,232,12' : '120,124,130';
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, `rgba(${col},0.30)`);
      grad.addColorStop(1, `rgba(${col},0)`);
      ctx.beginPath();
      ctx.moveTo(0, H);
      pts.forEach((p) => ctx.lineTo(p[0], p[1]));
      ctx.lineTo(W, H);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.beginPath();
      pts.forEach((p, i) => (i === 0 ? ctx.moveTo(p[0], p[1]) : ctx.lineTo(p[0], p[1])));
      ctx.lineWidth = 2;
      ctx.strokeStyle = `rgba(${col},${engine ? 0.95 : 0.5})`;
      ctx.shadowBlur = engine ? 10 : 0;
      ctx.shadowColor = `rgba(${col},0.8)`;
      ctx.stroke();
      ctx.shadowBlur = 0;
      this.raf = requestAnimationFrame(loop);
    };
    this.raf = requestAnimationFrame(loop);
  }

  renderVals() {
    const ACC = this.props?.accent ?? '#a9e80c';
    const knob = (v, arc, total) => ({
      val: Math.round(v),
      rot: -135 + (v / 100) * 270,
      dash: ((v / 100) * arc).toFixed(1) + ' ' + total,
    });
    const bands = this.state.bands.map((db, i) => {
      const pct = (db + 12) / 24;
      const lo = Math.min(pct, 0.5), hi = Math.max(pct, 0.5);
      return {
        freq: this.FREQS[i],
        dbLabel: (db > 0 ? '+' : '') + db.toFixed(1),
        dbColor: Math.abs(db) < 0.05 ? '#5d5d65' : ACC,
        handleBottom: `calc(${(pct * 100).toFixed(1)}% - 7px)`,
        fillBottom: `${(lo * 100).toFixed(1)}%`,
        fillHeight: `${((hi - lo) * 100).toFixed(1)}%`,
        onDown: this.makeBand(i),
      };
    });
    const idx = this.PRESET_ORDER.indexOf(this.state.preset);
    const pcol = (i) => (idx === i ? ACC : '#83838b');
    return {
      canvasRef: this.setCanvas,
      accentVar: ACC,
      engine: this.state.engine,
      engineLabel: this.state.engine ? 'Engine Active' : 'Engine Off',
      engineColor: this.state.engine ? ACC : '#6a6a72',
      engineGlow: this.state.engine ? 'rgba(169,232,12,.9)' : 'rgba(0,0,0,0)',
      onEngine: () => this.setState((s) => ({ engine: !s.engine })),
      master: knob(this.state.master, 263.9, 352),
      preamp: knob(this.state.preamp, 179.1, 239),
      onMaster: this.makeKnob('master'),
      onPreamp: this.makeKnob('preamp'),
      bands,
      presetTx: (idx < 0 ? 0 : idx) * 100 + '%',
      p0col: pcol(0), p1col: pcol(1), p2col: pcol(2), p3col: pcol(3),
      onPreset0: () => this.applyPreset('OFF'),
      onPreset1: () => this.applyPreset('DIALOGUE'),
      onPreset2: () => this.applyPreset('LEVELER'),
      onPreset3: () => this.applyPreset('CLARITY'),
      onZero: () => this.setState({ bands: [0, 0, 0, 0, 0, 0, 0, 0], preset: 'OFF' }),
    };
  }
}
</script>
</body>
</html>
